# goreleaser config for the `sr` host binary — the single shippable artifact.
# It embeds the Dockerfile assets + cross-compiled linux worker binaries, so the
# before-hook cross-compiles those into the embed dir first.
version: 2

project_name: sr

before:
  hooks:
    - go mod tidy
    # Cross-compile the in-container worker binaries embedded into sr.
    - sh -c 'CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o cmd/sr/assets/bin/worker-linux-amd64 ./cmd/worker'
    - sh -c 'CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o cmd/sr/assets/bin/worker-linux-arm64 ./cmd/worker'

builds:
  - id: sr
    main: ./cmd/sr
    binary: sr
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin] # windows ships via WSL2 (the linux binary)
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: sr
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

brews:
  - name: sr
    repository:
      owner: jclement
      name: homebrew-tap
      # PAT with write access to the tap repo (CI sets HOMEBREW_TAP_TOKEN).
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/jclement/shellraiser"
    description: "Sandboxed vibe-coding coordinator — one UI for many per-project worker containers"
    license: "MIT"
    dependencies:
      - name: docker
        type: optional
    install: |
      bin.install "sr"
    test: |
      system "#{bin}/sr", "help"
