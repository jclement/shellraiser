# goreleaser config for the `sb` host binary — the single shippable artifact.
# It embeds the Dockerfile assets + cross-compiled linux worker binaries, so the
# before-hook cross-compiles those into the embed dir first.
version: 2

project_name: sb

before:
  hooks:
    - go mod tidy
    # Cross-compile the in-container worker binaries embedded into sb.
    - sh -c 'CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o cmd/sb/assets/bin/worker-linux-amd64 ./cmd/slopbox'
    - sh -c 'CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o cmd/sb/assets/bin/worker-linux-arm64 ./cmd/slopbox'

builds:
  - id: sb
    main: ./cmd/sb
    binary: sb
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin] # windows ships via WSL2 (the linux binary)
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: sb
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

brews:
  - name: sb
    repository:
      owner: jclement
      name: homebrew-tap
    homepage: "https://github.com/jclement/slopbox"
    description: "Sandboxed vibe-coding coordinator — one UI for many per-project worker containers"
    license: "MIT"
    dependencies:
      - name: docker
        type: optional
    install: |
      bin.install "sb"
    test: |
      system "#{bin}/sb", "help"
