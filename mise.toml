# shellraiser dev toolchain + tasks.  `mise install` then `mise run <task>`.
[tools]
go = "1.26"
goreleaser = "latest"

[tasks.worker-bins]
description = "Cross-compile the linux worker binaries into the sr embed dir"
run = """
set -e
for arch in amd64 arm64; do
  CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -ldflags='-s -w' \
    -o cmd/sr/assets/bin/worker-linux-$arch ./cmd/worker
done
"""

[tasks.build]
description = "Cross-compile workers, embed them, and build the sr host binary into dist/"
depends = ["worker-bins"]
run = "CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o dist/sr ./cmd/sr"

[tasks.build-worker]
description = "Build just the in-container worker binary into dist/"
run = "CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o dist/shellraiser ./cmd/worker"

[tasks.test]
description = "Run the Go unit tests"
run = "go test ./..."

[tasks.e2e]
description = "Run the Playwright end-to-end browser tests (worker UI)"
run = "bash test/e2e/run.sh"

[tasks.e2e-coord]
description = "Run the v2 multi-project coordinator end-to-end test"
run = "bash test/e2e/coordinator.sh"

[tasks.dev]
description = "Run the coordinator in the foreground for the current repo (live logs, Ctrl-C tears it down)"
depends = ["build"]
run = "dist/sr --fg"

[tasks.nuke]
description = "Nuke this repo's worker (container + volume + network)"
run = "go run ./cmd/sr nuke \"$(basename \"$PWD\")\""

[tasks.package]
description = "Snapshot release build (goreleaser, no publish)"
run = "goreleaser release --snapshot --clean"
