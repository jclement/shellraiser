# slopbox dev toolchain + tasks.  `mise install` then `mise run <task>`.
[tools]
go = "1.26"
goreleaser = "latest"

[tasks.worker-bins]
description = "Cross-compile the linux worker binaries into the sb embed dir"
run = """
set -e
for arch in amd64 arm64; do
  CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -ldflags='-s -w' \
    -o cmd/sb/assets/bin/worker-linux-$arch ./cmd/slopbox
done
"""

[tasks.build]
description = "Cross-compile workers, embed them, and build the sb host binary into dist/"
depends = ["worker-bins"]
run = "CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o dist/sb ./cmd/sb"

[tasks.build-worker]
description = "Build just the in-container worker binary into dist/"
run = "CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o dist/slopbox ./cmd/slopbox"

[tasks.test]
description = "Run the Go unit tests"
run = "go test ./..."

[tasks.e2e]
description = "Run the Playwright end-to-end browser tests"
run = "bash test/e2e/run.sh"

[tasks.dev]
description = "Build the image and run a box in the foreground (--rm, live logs)"
run = "./slopbox.sh start --rebuild --fg"

[tasks.nuke]
description = "Nuke this repo's box + its persistent volume/state"
run = "./slopbox.sh nuke"

[tasks.package]
description = "Snapshot release build (goreleaser, no publish)"
run = "goreleaser release --snapshot --clean"
