# slopbox — run a sandboxed vibe-coding box against the current repo.
#   docker compose up -d && docker compose logs -f
services:
  slopbox:
    image: ghcr.io/jclement/slopbox:latest
    # build: .            # uncomment to build the image locally instead of pulling
    container_name: slopbox
    ports:
      - "7700:7000"       # host 7700 (NOT 7000 — macOS AirPlay Receiver uses 5000/7000)
    volumes:
      - ./:/work                       # the repo you're hacking on
      - slopbox-home:/home/ubuntu      # persistent state (tools, logins, worktrees)
      - slopbox-pg:/home/ubuntu/.local/share/slopbox/postgres   # postgres data (needs a real fs)
      # - /var/run/docker.sock:/var/run/docker.sock   # optional: host docker access
    environment:
      SLOPBOX_REPO: /work
      # SLOPBOX_POSTGRES: "0"          # disable the bundled postgres + pgweb
      # SLOPBOX_TOKEN: "choose-your-own"
      # --- external access (pick one) ---
      # CLOUDFLARE_TUNNEL_TOKEN: "..."
      # GATECRASH_SERVER: "tunnel.example.com:51234"
      # GATECRASH_TOKEN: "web-app:YOUR_SECRET"
      # GATECRASH_HOST_KEY: "SHA256:..."
    restart: unless-stopped

volumes:
  slopbox-home:
  slopbox-pg:
