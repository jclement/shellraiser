name: ci

# v2 ships a single Go binary (`sr`) that builds its worker image locally from
# embedded assets — there is no published container image. CI therefore builds +
# tests the Go code on every push/PR, and releases `sr` (+ the Homebrew tap) via
# goreleaser on v* tags.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile embedded linux worker binaries
        run: |
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -ldflags='-s -w' \
              -o cmd/sr/assets/bin/worker-linux-$arch ./cmd/worker
          done

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build sr for all targets
        run: |
          for t in "linux amd64" "linux arm64" "darwin amd64" "darwin arm64"; do
            set -- $t
            echo "building $1/$2"
            CGO_ENABLED=0 GOOS=$1 GOARCH=$2 go build -trimpath -o /dev/null ./cmd/sr
          done

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to jclement/homebrew-tap (add as a repo secret).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
