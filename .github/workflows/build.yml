name: build

# Builds and publishes the shellraiser image to GHCR.
#
# Triggers:
#   - push to main      -> publishes :edge (+ :sha)
#   - tag v*            -> publishes :vX.Y.Z, :X.Y, :latest
#   - weekly schedule   -> rebuilds to refresh base tooling (apt, mise, agents)
#   - manual dispatch
on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC — periodic base-tooling refresh
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # jclement/shellraiser

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            # main -> :edge ; tags also get :latest
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          # arm64 (Apple Silicon laptop) + amd64 (VPS). arm64 is emulated here,
          # so builds are slow — acceptable for a weekly/tagged cadence.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
