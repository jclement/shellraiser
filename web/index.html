<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>shellraiser</title>
  <script>
    // Apply the saved theme before paint to avoid a flash.
    (function () {
      var t = localStorage.getItem('shellraiser-theme') || 'system';
      var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', dark);
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { mono: ['JetBrainsMono Nerd Font', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'] } } } };
  </script>
  <style>
    /* JetBrainsMono Nerd Font (Mono): single-cell glyphs for Starship icons,
       powerline separators, and box drawing in the terminal. Bundled woff2. */
    @font-face {
      font-family: 'JetBrainsMono Nerd Font';
      font-style: normal; font-weight: 400; font-display: swap;
      src: url('/jbmono-regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'JetBrainsMono Nerd Font';
      font-style: normal; font-weight: 700; font-display: swap;
      src: url('/jbmono-bold.woff2') format('woff2');
    }
    /* Light: blues + grays. Dark: neutral ink + violet accent. */
    :root {
      --bg:#e7ecf3; --panel:#ffffff; --panel2:#dbe3ef; --hover:#e1e9f4;
      --border:#bfcbdd; --text:#0f1b2d; --muted:#43536b; --faint:#697892;
      --accent:#2563eb; --accent2:#1d4ed8; --accent-fg:#ffffff;
      --green:#0a7d44; --red:#c5302f; --yellow:#9a5b06; --term-bg:#0d1320; --term-fg:#cdd6e4;
    }
    .dark {
      --bg:#0a0a0b; --panel:#111113; --panel2:#1b1b1f; --hover:#161618;
      --border:#27272c; --text:#e4e4e7; --muted:#8a8a93; --faint:#52525b;
      --accent:#a855f7; --accent2:#7c3aed; --accent-fg:#ffffff;
      --green:#34d399; --red:#ef4444; --yellow:#fbbf24; --term-bg:#0a0a0b; --term-fg:#e4e4e7;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); overscroll-behavior: none; }
    #app { height: 100vh; height: 100dvh; }
    #term-area { overscroll-behavior: contain; touch-action: manipulation; }
    /* Mobile on-screen key bar + keyboard FAB (for keys phones lack). */
    #keybar { display: none; }
    #kb-fab { display: none; }
    @media (max-width: 767px) {
      #keybar.on { display: flex; gap: 4px; overflow-x: auto; padding: 6px;
        padding-bottom: calc(6px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: var(--panel); }
      #kb-fab.on { display: flex; }
    }
    .kbkey { flex: 0 0 auto; min-width: 40px; padding: 9px 11px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--panel2); color: var(--text); font-size: 13px; line-height: 1; }
    .kbkey.sticky-on { border-color: var(--accent); color: var(--accent); }
    #kb-fab { position: fixed; right: 14px; bottom: calc(76px + env(safe-area-inset-bottom)); z-index: 40;
      width: 46px; height: 46px; border-radius: 9999px; background: var(--accent); color: var(--accent-fg);
      align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(0,0,0,.35); }
    .bg-app{background:var(--bg)} .bg-panel{background:var(--panel)} .bg-panel2{background:var(--panel2)}
    .border-app{border-color:var(--border)} .text-app{color:var(--text)}
    .text-muted{color:var(--muted)} .text-faint{color:var(--faint)} .text-accent{color:var(--accent)}
    .hover-row:hover{background:var(--hover)}
    .icon{width:1rem;height:1rem;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto;display:inline-block;vertical-align:middle}
    .icon-sm{width:.8rem;height:.8rem;stroke-width:2}
    .icon-lg{width:2.25rem;height:2.25rem;opacity:.5}
    .btn{display:inline-flex;align-items:center;gap:.4rem;border:1px solid var(--border);color:var(--text);border-radius:.375rem;background:transparent;transition:border-color .15s,color .15s,background .15s}
    .btn:hover{border-color:var(--accent);color:var(--accent)}
    .btn-primary{background:var(--accent);color:var(--accent-fg);border:1px solid var(--accent)}
    .btn-primary:hover{background:var(--accent2)}
    .btn-danger{background:var(--red);color:#fff;border:1px solid var(--red)}
    .btn-danger:hover{filter:brightness(.92)}
    .iconbtn{color:var(--faint);transition:color .15s} .iconbtn:hover{color:var(--accent)}
    .input{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:.375rem;outline:none}
    .input:focus{border-color:var(--accent)}
    .row-sel{background:var(--panel2);box-shadow:inset 0 0 0 1px var(--accent)}
    .wt-row.drag-over{box-shadow:inset 0 2px 0 var(--accent)}
    #projects-section.collapsed #projects{display:none}
    #projects-section.collapsed #projects-chevron{transform:rotate(-90deg)}
    .seg{color:var(--faint);border-radius:.25rem;padding:.25rem;transition:.15s}
    .seg:hover{color:var(--muted)} .seg.active{color:var(--accent);background:var(--panel2)}
    .xterm { padding: 8px 10px; }
    .term-host { position: absolute; inset: 0; }
    .term-host.hidden { visibility: hidden; pointer-events: none; }
    /* diff/review */
    .diff-add { background: rgba(46,160,67,.14); color: #7ee787; }
    .diff-del { background: rgba(248,81,73,.14); color: #ffa198; }
    .diff-add-txt { color: var(--green); }
    .diff-del-txt { color: var(--red); }
    .diff-file { position: sticky; top: 0; }
    .term-reconnecting { position: absolute; top: 8px; right: 12px; z-index: 5; font-size: 11px; color: var(--accent-fg); background: var(--accent); padding: 2px 8px; border-radius: 9999px; opacity: .9; }
    .term-reconnecting.hidden { display: none; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    .dot-running { animation: pulse-dot 1s ease-in-out infinite; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  </style>
</head>
<body class="font-mono antialiased">
  <!-- Login overlay -->
  <div id="login" class="fixed inset-0 z-50 hidden items-center justify-center bg-app p-4">
    <div class="w-[22rem] overflow-hidden rounded-lg border border-app bg-panel">
      <div class="flex flex-col items-center gap-1 border-b border-app px-4 py-6">
        <img src="/logo.png" alt="ShellRaiser" class="w-72 max-w-full" />
      </div>
      <!-- Sign in -->
      <div id="login-signin" class="hidden px-4 py-4">
        <label class="block text-[11px] text-muted">Password</label>
        <input id="login-pw" type="password" autocomplete="current-password" class="input mt-1 w-full px-2.5 py-2 text-sm" />
        <button id="login-btn" class="btn btn-primary mt-4 w-full justify-center px-3 py-2 text-sm font-medium"><span data-icon="key" class="icon-sm"></span><span>Sign in</span></button>
      </div>
      <!-- Set / choose a password (first run or change) -->
      <div id="login-setpw" class="hidden px-4 py-4">
        <div class="mb-3 text-[11px] font-semibold uppercase tracking-wider text-faint">Choose a password</div>
        <div id="setpw-hint" class="mb-2 text-xs text-muted"></div>
        <label class="block text-[11px] text-muted">New password <span class="text-faint">(min 6 chars)</span></label>
        <input id="setpw-1" type="password" autocomplete="new-password" class="input mt-1 w-full px-2.5 py-2 text-sm" />
        <label class="mt-3 block text-[11px] text-muted">Confirm</label>
        <input id="setpw-2" type="password" autocomplete="new-password" class="input mt-1 w-full px-2.5 py-2 text-sm" />
        <button id="setpw-btn" class="btn btn-primary mt-4 w-full justify-center px-3 py-2 text-sm">Set password</button>
      </div>
      <div id="login-err" class="mx-4 mb-4 hidden border-l-2 px-2.5 py-1.5 text-xs" style="border-color:var(--red);color:var(--red);background:color-mix(in srgb,var(--red) 10%,transparent)"></div>
    </div>
  </div>

  <div id="app" class="flex h-screen w-screen overflow-hidden">
    <!-- Mobile backdrop -->
    <div id="backdrop" class="fixed inset-0 z-20 hidden bg-black/60 md:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 flex w-72 max-w-[85vw] shrink-0 -translate-x-full flex-col border-r border-app bg-panel transition-transform duration-200 md:static md:translate-x-0">
      <div class="flex items-center gap-2 border-b border-app px-4 py-3.5">
        <span class="text-accent" data-icon="box"></span>
        <span class="font-semibold tracking-tight text-app">shellraiser</span>
        <span id="repo-name" class="ml-auto truncate text-xs text-faint"></span>
      </div>

      <!-- Projects rail (cross-project): one coordinator, many workers -->
      <div id="projects-section" class="hidden border-b border-app">
        <button id="projects-toggle" class="flex w-full items-center gap-1 px-4 pb-1 pt-3 text-[11px] font-semibold uppercase tracking-wider text-faint hover:text-muted">
          <span id="projects-chevron" class="transition-transform">▾</span><span>Projects</span>
        </button>
        <nav id="projects" class="max-h-44 overflow-y-auto px-2 pb-2"></nav>
      </div>

      <div class="px-3 pb-2 pt-3">
        <button id="new-worktree" class="btn w-full justify-center px-3 py-2 text-sm"><span>New Worktree</span></button>
      </div>

      <div class="flex items-center gap-2 px-3 pb-1">
        <input id="wt-filter" placeholder="Filter worktrees…" autocomplete="off" spellcheck="false"
          class="input w-full px-2 py-1 text-[11px] text-app" />
      </div>
      <nav id="worktrees" class="flex-1 overflow-y-auto px-2 pb-3"></nav>

      <!-- Ports -->
      <div class="border-t border-app px-4 py-3">
        <div class="mb-2 flex items-center gap-2 text-[11px] font-semibold uppercase tracking-wider text-faint">
          <span>Ports</span><span id="ports-count" class="text-faint"></span>
          <button id="ssh-copy" class="iconbtn ml-auto hidden" title="Copy an SSH command that forwards all ports"><span data-icon="key" class="icon-sm"></span></button>
        </div>
        <div id="ports" class="flex flex-col gap-0.5 text-xs"></div>
      </div>

      <!-- Footer: theme + account -->
      <div class="flex items-center gap-1 border-t border-app px-3 py-2">
        <button class="seg" data-theme="system" title="System theme"><span data-icon="monitor" class="icon-sm"></span></button>
        <button class="seg" data-theme="light" title="Light theme"><span data-icon="sun" class="icon-sm"></span></button>
        <button class="seg" data-theme="dark" title="Dark theme"><span data-icon="moon" class="icon-sm"></span></button>
        <div class="ml-auto flex items-center gap-1">
          <button id="db-btn" class="iconbtn hidden p-1" title="Database (pgweb)"><span data-icon="database" class="icon-sm"></span></button>
          <button id="about-btn" class="iconbtn p-1" title="About"><span data-icon="info" class="icon-sm"></span></button>
          <button id="settings-btn" class="iconbtn hidden p-1" title="Settings"><span data-icon="key" class="icon-sm"></span></button>
          <button id="logout" class="iconbtn hidden p-1" title="Sign out"><span data-icon="logout" class="icon-sm"></span></button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex min-w-0 flex-1 flex-col bg-app">
      <div class="flex items-center gap-2 border-b border-app bg-panel px-2 py-2 sm:px-3">
        <button id="menu-btn" class="iconbtn shrink-0 p-1.5 md:hidden" aria-label="Toggle worktrees"><span data-icon="menu"></span></button>
        <div id="active-context" class="flex min-w-0 flex-1 items-center gap-2 text-sm">
          <span class="text-muted">Select a worktree</span>
        </div>
      </div>

      <div class="relative flex min-h-[2.75rem] items-stretch border-b border-app bg-panel text-sm">
        <div id="tabs" class="flex min-w-0 flex-1 items-stretch gap-px overflow-x-auto"></div>
        <button id="add-tab" class="iconbtn flex shrink-0 items-center border-l border-app px-3" title="New session" data-icon="plus"></button>
        <div id="launch-menu" class="absolute right-1 top-full z-40 mt-1 hidden min-w-[11rem] rounded-md border border-app bg-panel py-1 shadow-lg"></div>
      </div>

      <div id="term-area" class="relative flex-1 overflow-hidden bg-app">
        <div id="empty-state" class="flex h-full flex-col items-center justify-center gap-2 text-center text-faint">
          <span data-icon="terminal" class="icon-lg"></span>
          <div class="text-sm">No sessions open.</div>
          <div class="text-xs">Pick a worktree, then launch claude · codex · shell · editor.</div>
        </div>
        <!-- Review/diff overlay (covers the terminals when open) -->
        <div id="review-panel" class="absolute inset-0 z-20 hidden flex-col bg-app">
          <div id="review-head" class="flex shrink-0 items-center gap-2 border-b border-app px-3 py-2 text-sm"></div>
          <div id="review-body" class="min-h-0 flex-1 overflow-auto font-mono text-xs leading-relaxed"></div>
          <div id="review-foot" class="flex shrink-0 items-center gap-2 border-t border-app px-3 py-2"></div>
        </div>
      </div>
      <div id="keybar"></div>
    </main>
  </div>

  <button id="kb-fab" data-icon="key" title="Keyboard"></button>
  <div id="modal-root" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/50 p-4"></div>

  <!-- Command palette (⌘K / Ctrl-K) -->
  <div id="palette" class="fixed inset-0 z-[70] hidden items-start justify-center bg-black/50 p-4 pt-[12vh]">
    <div class="flex max-h-[70vh] w-[34rem] max-w-full flex-col overflow-hidden rounded-lg border border-app bg-panel shadow-2xl">
      <input id="palette-input" placeholder="Jump to a tab, worktree, project — or start a session…" autocomplete="off" spellcheck="false"
        class="w-full border-b border-app bg-panel px-4 py-3 text-sm text-app outline-none" />
      <div id="palette-list" class="flex-1 overflow-y-auto py-1"></div>
    </div>
  </div>

  <div id="toast" class="pointer-events-none fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>
  <script src="/app.js"></script>
</body>
</html>
